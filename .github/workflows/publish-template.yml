name: Publish CFN template to S3

on:
  push:
    branches: [ master ]
    paths:
      - 'aws/template.yaml'
      - '.github/workflows/publish-template.yml'
  workflow_dispatch:

concurrency:
  group: publish-template
  cancel-in-progress: false

permissions:
  id-token: write   # for OIDC AssumeRoleWithWebIdentity
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    # Fork this repo? Configure these under Settings > Secrets and variables >
    # Actions > Variables (repo-level, not secrets — none of these are sensitive).
    # See aws/README.md.
    # Fork? Override with a repo-scoped var CLAUDE_BOX_ENVIRONMENT, or edit the fallback.
    environment: ${{ vars.CLAUDE_BOX_ENVIRONMENT || 'defang-claude-box' }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      BUCKET: ${{ vars.CLAUDE_BOX_BUCKET }}
      OBJECT_KEY: template.yaml
      ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
    steps:
      - name: Sanity-check required variables
        run: |
          missing=()
          [ -n "$BUCKET" ]   || missing+=("CLAUDE_BOX_BUCKET")
          [ -n "$ROLE_ARN" ] || missing+=("AWS_ROLE_ARN")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing repo variable(s): ${missing[*]}. Set under Settings > Actions > Variables. See aws/README.md."
            exit 1
          fi

      - uses: actions/checkout@v5

      - name: Validate template locally
        run: |
          pip install --quiet cfn-lint
          cfn-lint aws/template.yaml

      - name: Inject pinned Rev + Sha256 defaults for the 1-click copy
        # The source template deliberately ships without Default: values for
        # ClaudeBoxRev / ClaudeBoxSha256 (see the param's Description) — the
        # 1-click Launch buttons need them pre-filled, so we inject the current
        # master commit + its module sha256 as the S3 template's defaults.
        run: |
          rev="${{ github.sha }}"
          sha="sha256-$(curl -sSfL "https://raw.githubusercontent.com/${{ github.repository }}/${rev}/modules/claude-box.nix" \
            | openssl dgst -sha256 -binary | base64)"
          echo "Rev: $rev"
          echo "Sha: $sha"
          awk -v rev="$rev" -v sha="$sha" '
            /^  ClaudeBoxRev:$/     { rf=1; print; next }
            rf && /^    Type:/      { print; print "    Default: " rev; rf=0; next }
            /^  ClaudeBoxSha256:$/  { sf=1; print; next }
            sf && /^    Type:/      { print; print "    Default: " sha; sf=0; next }
            { print }
          ' aws/template.yaml > aws/template.filled.yaml
          if ! grep -qE "^    Default: $rev$" aws/template.filled.yaml \
             || ! grep -qE "^    Default: $sha$" aws/template.filled.yaml; then
            echo "::error::Default injection failed — expected lines not present in filled template."
            diff aws/template.yaml aws/template.filled.yaml || true
            exit 1
          fi
          cfn-lint aws/template.filled.yaml

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate template with CloudFormation
        run: aws cloudformation validate-template --template-body "file://aws/template.filled.yaml"

      - name: Upsert bucket + public-read policy on template.yaml
        run: |
          if aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            echo "Bucket $BUCKET already exists."
          else
            echo "Creating bucket $BUCKET in $AWS_REGION..."
            # us-east-1 rejects LocationConstraint; other regions require it.
            if [ "$AWS_REGION" = "us-east-1" ]; then
              aws s3api create-bucket --bucket "$BUCKET"
            else
              aws s3api create-bucket --bucket "$BUCKET" --region "$AWS_REGION" \
                --create-bucket-configuration "LocationConstraint=$AWS_REGION"
            fi
          fi

          # Idempotent — always re-applied so drift can't leave the bucket private.
          aws s3api put-public-access-block --bucket "$BUCKET" \
            --public-access-block-configuration \
              'BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=false,RestrictPublicBuckets=false'

          # Public-read on template.yaml only — CloudFormation's Launch Stack UI
          # requires an S3 URL for templateURL. The module itself is fetched by
          # the box direct from raw.githubusercontent.com (dual-stack), so this
          # bucket carries no other public assets.
          aws s3api put-bucket-policy --bucket "$BUCKET" --policy "$(cat <<POLICY
          {
            "Version": "2012-10-17",
            "Statement": [{
              "Sid": "PublicReadClaudeBoxTemplate",
              "Effect": "Allow",
              "Principal": "*",
              "Action": "s3:GetObject",
              "Resource": "arn:aws:s3:::${BUCKET}/template.yaml"
            }]
          }
          POLICY
          )"

      - name: Upload to S3
        run: |
          aws s3 cp aws/template.filled.yaml "s3://${BUCKET}/${OBJECT_KEY}" \
            --content-type "application/x-yaml" \
            --cache-control "no-cache, max-age=0"
          echo "::notice::Published to https://${BUCKET}.s3.amazonaws.com/${OBJECT_KEY}"
