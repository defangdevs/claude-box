name: CI

on:
  push:
    branches: [ master ]
    paths: &build-paths
      - '**.nix'
      - 'flake.lock'
      - '.github/workflows/ci.yml'
  pull_request:
    paths: *build-paths
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate module & VM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Show flake metadata
        run: nix flake metadata

      # Fast eval gates first — surface option/type errors before any build.
      - name: Evaluate VM & qcow derivations
        run: |
          nix eval --raw .#nixosConfigurations.vm.config.system.build.vm.drvPath
          echo
          nix eval --raw .#packages.x86_64-linux.vm.drvPath
          echo

      # Asserts the multi-user example generates a service per agent.
      - name: Check multi-user generation
        run: nix build -L .#checks.x86_64-linux.multi-user && cat result

      # Eval-only guard for issue 51: deployed boxes (CFN user-data +
      # self-update) fetch modules/claude-box.nix as a single file, so any
      # ./sibling reference breaks first boot. Catch it here, not post-merge.
      - name: Check module evaluates as a single file
        run: nix build -L .#checks.x86_64-linux.module-single-file && cat result

      # Full closure build — the real "module is usable" proof.
      - name: Build VM system closure
        run: nix build -L .#checks.x86_64-linux.vm-closure

      # Interactive VM test: brute-forcing the web terminal's basic auth gets
      # the client banned. ubuntu-latest runners have KVM but /dev/kvm is
      # root-only by default; open it up so the qemu inside the nix build can
      # use it (https://github.blog/changelog/2023-02-23-hardware-accelerated-android-virtualization-on-actions-linux-larger-hosted-runners/).
      - name: Enable KVM for the test driver
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Run web fail2ban VM test
        run: nix build -L .#checks.x86_64-linux.web-fail2ban

      # Interactive VM test: an agent user adds a virtual host at runtime by
      # writing a snippet to ~/sites/ and reloading caddy — no rebuild.
      - name: Run self-serve domain VM test
        run: nix build -L .#checks.x86_64-linux.self-serve-domain

      # Interactive VM test: the settings page stores a secret through the
      # browser and the agent unit picks it up (was added in PR 43 but never
      # wired into CI).
      - name: Run settings page VM test
        run: nix build -L .#checks.x86_64-linux.settings-page
