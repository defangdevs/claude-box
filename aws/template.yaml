AWSTemplateFormatVersion: '2010-09-09'

# W2010: WebPassword is NoEcho but appears in the WebURL output. That is by
# design - the whole point of the output is to give the user the URL, and the
# token is part of the URL. Anyone with cloudformation:DescribeStacks on this
# stack can see it; treat that as the same trust boundary as the shared secret.
Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Terminal access
        Parameters:
          - WebPassword
          - SessionName
      - Label:
          default: Compute and cost
        Parameters:
          - InstanceType
          - UseSpot
          - PublicIpv4
      - Label:
          default: Advanced (rarely needed)
        Parameters:
          - AllowCidr
          - ClaudeBoxRev
          - ClaudeBoxSha256
    ParameterLabels:
      WebPassword:
        default: Web terminal token (blank = auto-generated)
      SessionName:
        default: Remote Control session name (blank = agent@host)
      InstanceType:
        default: EC2 instance type
      UseSpot:
        default: Use a Spot instance (cheaper)
      PublicIpv4:
        default: Allocate a public IPv4 (costs ~$3.60/mo)
      AllowCidr:
        default: IPv4 CIDR allowed to reach 22/443
      ClaudeBoxRev:
        default: claude-box git rev
      ClaudeBoxSha256:
        default: claude-box tarball sha256
  cfn-lint:
    config:
      ignore_checks:
        - W2010

Description: >
  claude-box - 1-click NixOS host running Claude Code inside a persistent tmux
  session. Reach it through a browser terminal (Caddy + ttyd) or drive it from
  the Claude desktop and mobile apps via Remote Control.
  Source: https://github.com/defangdevs/claude-box

Parameters:
  InstanceType:
    Type: String
    Default: t3.small
    AllowedValues:
      - t3.small
      - t3.medium
      - t3.large
      - t3.xlarge
      - m6i.large
      - m6i.xlarge
      - c6i.large
    Description: >-
      EC2 instance type. t3.small (~2 GB RAM) is fine for a single light agent.

  PublicIpv4:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: >-
      false (default): IPv6-only. No public IPv4 charge (~$0/mo for the
      network address). Requires the client to have IPv6 connectivity.
      true: allocate an Elastic IP for a stable IPv4. ~$3.60/mo per AWS's
      2024 IPv4 pricing (charged for any public IPv4, EIP or not).

  UseSpot:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: >-
      true (default): run as a persistent Spot instance (~70-90% cheaper).
      On a Spot interruption AWS stops the instance and restarts the SAME
      instance in the SAME AZ when capacity returns, so the root volume,
      IPv6 address, and TLS cert all survive. The live tmux session does
      not (RAM is lost on any stop). Risk: if this AZ+type pool stays
      capacity-starved, the box stays stopped until it frees up.
      false: on-demand (always available, full price).

  WebPassword:
    Type: String
    NoEcho: true
    Default: ''
    MaxLength: 64
    AllowedPattern: ^$|^[A-Za-z0-9._~-]{16,64}$
    Description: >-
      Shared secret embedded in the URL as a path token (browsers do not
      reliably attach Basic Auth to WebSocket upgrades, so we use a path token
      instead of a username/password prompt). Leave blank to auto-generate one
      from the stack's unique id - the full URL (token included) is shown in the
      stack Outputs. If you set your own: 16-64 URL-safe chars [A-Za-z0-9._~-].

  SessionName:
    Type: String
    Default: ''
    MaxLength: 64
    AllowedPattern: ^[A-Za-z0-9._@+-]{0,64}$
    Description: >-
      Optional. Name shown for this box's Claude Remote Control session in the
      Claude apps, so you can tell boxes apart. Leave blank to auto-name it
      agent@<host>. Must be shell-safe: [A-Za-z0-9._@+-], no spaces.

  AllowCidr:
    Type: String
    Default: 0.0.0.0/0
    AllowedPattern: ^\d{1,3}(\.\d{1,3}){3}/\d{1,2}$
    Description: >-
      IPv4 CIDR allowed to reach 22/443. Default is open. IPv6 ingress is
      always ::/0 - restrict at the SG level after launch if needed.

  ClaudeBoxRev:
    Type: String
    Default: 68d4b94ab85fbbd6b90a36cf5613a5559d22e869
    Description: Git rev of defangdevs/claude-box (the module to install).

  ClaudeBoxSha256:
    Type: String
    Default: 07ki5hxdrqs38w47vfyvy4x0va9kyylkqiir6zm86imsw8gyq2p4
    Description: >-
      Nix base-32 sha256 of the module tarball at ClaudeBoxRev. Regenerate via
      `nix-prefetch-url --unpack https://github.com/defangdevs/claude-box/archive/<REV>.tar.gz`.

Conditions:
  UseIpv4: !Equals [!Ref PublicIpv4, 'true']
  UseSpotCond: !Equals [!Ref UseSpot, 'true']
  HasSessionName: !Not [!Equals [!Ref SessionName, '']]
  HasWebPassword: !Not [!Equals [!Ref WebPassword, '']]

Mappings:
  # BEGIN AMI MAP (refreshed by scripts/refresh_amis.py - do not edit by hand)
  RegionMap:
    us-east-1:
      AMI: ami-0afa19b238bdf9da0
    us-west-2:
      AMI: ami-0521ba8e76c2094b9
    eu-central-1:
      AMI: ami-00ae5c892b1a9cb23
    eu-west-1:
      AMI: ami-0a7e28f614241d0af
  # END AMI MAP

Resources:
  # Self-contained VPC + IPv6 subnet + IGW + routes. Older AWS default VPCs
  # never got IPv6, so we can't rely on the account's default networking
  # when the template's whole point is to be IPv6-first.
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.42.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true

  VpcIpv6:
    Type: AWS::EC2::VPCCidrBlock
    Properties:
      VpcId: !Ref Vpc
      AmazonProvidedIpv6CidrBlock: true

  Igw:
    Type: AWS::EC2::InternetGateway

  IgwAttach:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref Vpc
      InternetGatewayId: !Ref Igw

  Subnet:
    Type: AWS::EC2::Subnet
    DependsOn: VpcIpv6
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Select [0, !GetAZs '']
      CidrBlock: 10.42.1.0/24
      Ipv6CidrBlock: !Select
        - 0
        - !Cidr [!Select [0, !GetAtt Vpc.Ipv6CidrBlocks], 1, 64]
      AssignIpv6AddressOnCreation: true
      # DNS64: the VPC resolver returns synthesized AAAA in 64:ff9b::/96 for
      # IPv4-only hostnames (github.com etc.). Combined with the NAT64 route
      # below, an IPv6-only instance can reach IPv4-only upstreams via the IGW.
      EnableDns64: true

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc

  RouteV4:
    Type: AWS::EC2::Route
    DependsOn: IgwAttach
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref Igw

  RouteV6:
    Type: AWS::EC2::Route
    DependsOn: IgwAttach
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationIpv6CidrBlock: ::/0
      GatewayId: !Ref Igw

  # NAT64: IGW translates traffic to 64:ff9b::/96 into IPv4 automatically
  # (since Nov 2023). Together with EnableDns64 on the subnet, this lets an
  # IPv6-only instance reach IPv4-only sites like github.com.
  RouteNat64:
    Type: AWS::EC2::Route
    DependsOn: IgwAttach
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationIpv6CidrBlock: 64:ff9b::/96
      GatewayId: !Ref Igw

  SubnetRouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref RouteTable
      SubnetId: !Ref Subnet

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: 'claude-box: 443 (web terminal) + 22 (SSH), v4 + v6'
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: !Ref AllowCidr
          Description: Web terminal (Caddy) v4
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIpv6: ::/0
          Description: Web terminal (Caddy) v6
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref AllowCidr
          Description: SSH v4
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIpv6: ::/0
          Description: SSH v6

  # NetworkInterface: created explicitly so we can Fn::GetAtt.PrimaryIpv6Address.
  # EnablePrimaryIpv6 is REQUIRED for that GetAtt to return a value: without a
  # designated primary IPv6, Ipv6AddressCount still assigns an address but
  # PrimaryIpv6Address resolves to empty -> "https://.sslip.io/" + blank output.
  NetworkInterface:
    Type: AWS::EC2::NetworkInterface
    Properties:
      SubnetId: !Ref Subnet
      Ipv6AddressCount: 1
      EnablePrimaryIpv6: true
      GroupSet:
        - !GetAtt SecurityGroup.GroupId

  EIP:
    Type: AWS::EC2::EIP
    Condition: UseIpv4
    Properties:
      Domain: vpc

  EIPAssoc:
    Type: AWS::EC2::EIPAssociation
    Condition: UseIpv4
    Properties:
      NetworkInterfaceId: !Ref NetworkInterface
      AllocationId: !GetAtt EIP.AllocationId

  # Carries the persistent-Spot-with-stop options. On a Spot interruption AWS
  # stops (does not terminate) the instance and restarts the SAME instance in
  # the SAME AZ when capacity returns, so root EBS + IPv6 + TLS cert survive.
  # No MaxPrice, so the cap is the on-demand rate.
  SpotLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Condition: UseSpotCond
    Properties:
      LaunchTemplateData:
        InstanceMarketOptions:
          MarketType: spot
          SpotOptions:
            SpotInstanceType: persistent
            InstanceInterruptionBehavior: stop

  Instance:
    Type: AWS::EC2::Instance
    # Routing must exist before boot so egress works. Even IPv6-only instances
    # reach IPv4-only GitHub via the subnet's DNS64 + NAT64 route, so no public
    # IPv4 is needed to fetch the claude-box tarball during amazon-init.
    # Do NOT DependsOn EIPAssoc: it's conditional (UseIpv4), and DependsOn on an
    # excluded resource makes CFN reject the whole template in IPv6-only mode
    # ("Unresolved resource dependencies [EIPAssoc]"). The EIP is inbound-only
    # and associates in parallel, well before Caddy's ACME step needs it.
    DependsOn:
      - IgwAttach
      - SubnetRouteAssoc
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !FindInMap [RegionMap, !Ref AWS::Region, AMI]
      # Spot options must ride on a launch template - AWS::EC2::Instance has no
      # InstanceMarketOptions of its own. Referenced only when UseSpot=true.
      LaunchTemplate: !If
        - UseSpotCond
        - LaunchTemplateId: !Ref SpotLaunchTemplate
          Version: !GetAtt SpotLaunchTemplate.LatestVersionNumber
        - !Ref AWS::NoValue
      NetworkInterfaces:
        - NetworkInterfaceId: !Ref NetworkInterface
          DeviceIndex: 0
      MetadataOptions:
        HttpTokens: required
        HttpPutResponseHopLimit: 2
      Tags:
        - Key: Name
          Value: claude-box
      UserData:
        Fn::Base64:
          Fn::Sub:
            - |
              { config, pkgs, lib, modulesPath, ... }:
              let
                claude-box = builtins.fetchTarball {
                  url = "https://github.com/defangdevs/claude-box/archive/${ClaudeBoxRev}.tar.gz";
                  sha256 = "${ClaudeBoxSha256}";
                };
                hostname = "${WebHostname}";
                webPassword = "${WebPasswordEff}";
              in {
                imports = [
                  "${!modulesPath}/virtualisation/amazon-image.nix"
                  (claude-box + "/modules/claude-box.nix")
                ];

                services.claude-box = {
                  enable = true;
                  users.agent = {
                    environment = { TERM = "xterm-256color"; };${SessionNameLine}
                  };
                };

                networking.firewall.allowedTCPPorts = [ 22 443 ];

                services.caddy = {
                  enable = true;
                  virtualHosts."${!hostname}" = {
                    extraConfig = ''
                      tls {
                        issuer acme {
                          disable_http_challenge
                        }
                      }
                      @authed path /${!webPassword}/*
                      handle @authed {
                        reverse_proxy 127.0.0.1:7681
                      }
                      respond 404
                    '';
                  };
                };

                systemd.services.claude-web-terminal = {
                  description = "Browser terminal (ttyd) attached to agent's tmux";
                  after = [ "claude-box-agent.service" "network-online.target" ];
                  wants = [ "network-online.target" ];
                  wantedBy = [ "multi-user.target" ];
                  serviceConfig = {
                    User = "agent";
                    Restart = "always";
                    RestartSec = "5s";
                    ExecStart = "${!pkgs.ttyd}/bin/ttyd --writable -p 7681 -i 127.0.0.1 -b /${!webPassword}/ -t titleFixed=claude-box ${!pkgs.tmux}/bin/tmux -L claude-box attach -t main";
                  };
                };

                # Don't re-apply user-data on every reboot - protects local edits.
                systemd.services.amazon-init.enable = lib.mkForce false;
              }
            - WebHostname: !If
                - UseIpv4
                - !Sub "${EIP}.sslip.io"
                - !Sub
                  - "${IpDashed}.sslip.io"
                  - IpDashed: !Join
                      - '-'
                      - !Split [':', !GetAtt NetworkInterface.PrimaryIpv6Address]
              # Blank when SessionName is unset, so the module falls back to its
              # own default (agent@<host>). Leading newline keeps Nix layout tidy.
              SessionNameLine: !If
                - HasSessionName
                - !Sub "\n                    remoteControlName = \"${SessionName}\";"
                - ''
              # User-supplied token, or the stack's UUID when left blank. The
              # UUID is 122 random bits and only visible to principals with
              # cloudformation:DescribeStacks - the same trust boundary as the
              # token-in-URL itself.
              WebPasswordEff: !If
                - HasWebPassword
                - !Ref WebPassword
                - !Select [2, !Split ['/', !Ref 'AWS::StackId']]

Outputs:
  WebURL:
    Description: >-
      Browser terminal (also drivable from the Claude apps via Remote Control).
      First load takes ~2-3 minutes while the instance provisions and Caddy
      issues an ACME cert. The URL includes the WebPassword token - keep it
      private.
    Value: !Sub
      - "https://${Host}.sslip.io/${Pw}/"
      - Host: !If
          - UseIpv4
          - !Ref EIP
          - !Join
              - '-'
              - !Split [':', !GetAtt NetworkInterface.PrimaryIpv6Address]
        Pw: !If
          - HasWebPassword
          - !Ref WebPassword
          - !Select [2, !Split ['/', !Ref 'AWS::StackId']]

  PublicAddress:
    Description: Elastic IP (IPv4 mode) or primary IPv6 (IPv6 mode).
    Value: !If
      - UseIpv4
      - !Ref EIP
      - !GetAtt NetworkInterface.PrimaryIpv6Address

  InstanceId:
    Description: EC2 instance id.
    Value: !Ref Instance
