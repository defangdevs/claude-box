AWSTemplateFormatVersion: '2010-09-09'

# W2010: WebPassword is NoEcho but appears in the WebURL output. That is by
# design - the whole point of the output is to give the user the URL, and the
# token is part of the URL. Anyone with cloudformation:DescribeStacks on this
# stack can see it; treat that as the same trust boundary as the shared secret.
Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Terminal access
        Parameters:
          - Agent
          - WebPassword
          - SessionName
      - Label:
          default: Compute and cost
        Parameters:
          - InstanceType
          - UseSpot
          - PublicIpv4
      - Label:
          default: Advanced (rarely needed)
        Parameters:
          - AllowCidr
          - ClaudeBoxRev
          - ClaudeBoxSha256
    ParameterLabels:
      WebPassword:
        default: Web terminal token (blank = auto-generated)
      Agent:
        default: Agent CLI
      SessionName:
        default: Claude Remote Control session name (blank = agent@host)
      InstanceType:
        default: EC2 instance type
      UseSpot:
        default: Use a Spot instance (cheaper)
      PublicIpv4:
        default: Allocate a public IPv4 (costs ~$3.60/mo)
      AllowCidr:
        default: IPv4 CIDR allowed to reach 443
      ClaudeBoxRev:
        default: claude-box git rev
      ClaudeBoxSha256:
        default: claude-box module sha256
  cfn-lint:
    config:
      ignore_checks:
        - W2010

Description: >
  claude-box - 1-click NixOS host running a coding agent inside a persistent
  tmux session. Choose Claude Code or Codex at deployment time. Reach it through
  a browser terminal (Caddy + ttyd); Claude Code sessions can also be driven
  from the Claude desktop and mobile apps via Remote Control.
  Source: https://github.com/defangdevs/claude-box

Parameters:
  Agent:
    Type: String
    Default: claude
    AllowedValues:
      - claude
      - codex
    Description: >-
      Agent CLI to run in the persistent tmux session. Supported values:
      claude (Claude Code) and codex (OpenAI Codex CLI). Claude-specific
      Remote Control settings are ignored when codex is selected.

  InstanceType:
    Type: String
    Default: t4g.small
    AllowedValues:
      - t4g.small
      - t4g.medium
      - t4g.large
      - t4g.xlarge
      - m7g.large
      - m7g.xlarge
      - c7g.large
    Description: >-
      EC2 instance type. All choices are Graviton (aarch64) — cheaper than
      the x86 equivalents and paired with an aarch64 NixOS AMI in the
      RegionMap below. t4g.small (~2 GB RAM, ~$0.017/hr) is fine for a
      single light agent.

  PublicIpv4:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: >-
      false (default): IPv6-only. No public IPv4 charge (~$0/mo for the
      network address). Requires the client to have IPv6 connectivity.
      true: allocate an Elastic IP for a stable IPv4. ~$3.60/mo per AWS's
      2024 IPv4 pricing (charged for any public IPv4, EIP or not).

  UseSpot:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: >-
      true (default): run as a persistent Spot instance (~70-90% cheaper).
      On a Spot interruption AWS stops the instance and restarts the SAME
      instance in the SAME AZ when capacity returns, so the root volume,
      IPv6 address, and TLS cert all survive. The live tmux session does
      not (RAM is lost on any stop). Risk: if this AZ+type pool stays
      capacity-starved, the box stays stopped until it frees up.
      false: on-demand (always available, full price).

  WebPassword:
    Type: String
    NoEcho: true
    Default: ''
    MaxLength: 64
    AllowedPattern: ^$|^[A-Za-z0-9._~-]{16,64}$
    Description: >-
      Shared secret embedded in the URL as a path token (browsers do not
      reliably attach Basic Auth to WebSocket upgrades, so we use a path token
      instead of a username/password prompt). Leave blank to auto-generate one
      from the stack's unique id - the full URL (token included) is shown in the
      stack Outputs. If you set your own: 16-64 URL-safe chars [A-Za-z0-9._~-].

  SessionName:
    Type: String
    Default: ''
    MaxLength: 64
    AllowedPattern: ^[A-Za-z0-9._@+-]{0,64}$
    Description: >-
      Optional. Name shown for this box's Claude Remote Control session in the
      Claude apps, so you can tell boxes apart. Applies only when Agent=claude.
      Leave blank to auto-name it agent@<host>. Must be shell-safe:
      [A-Za-z0-9._@+-], no spaces.

  AllowCidr:
    Type: String
    Default: 0.0.0.0/0
    AllowedPattern: ^\d{1,3}(\.\d{1,3}){3}/\d{1,2}$
    Description: >-
      IPv4 CIDR allowed to reach 443. Default is open. IPv6 ingress is
      always ::/0 - restrict at the SG level after launch if needed.

  ClaudeBoxRev:
    Type: String
    Default: master
    Description: >-
      Git rev or ref of defangdevs/claude-box. The module (a single .nix file)
      is fetched from raw.githubusercontent.com at this ref - that host is
      dual-stack (IPv6-reachable), so an IPv6-only box needs no NAT64 path.
      github.com itself is IPv4-only and can't be used directly.

  ClaudeBoxSha256:
    Type: String
    Default: sha256-7XKISFFxB3FfMXouRfv0hcBNmtL9KNBX+YB/W9HIa/g=
    Description: >-
      Nix sha256 of modules/claude-box.nix at ClaudeBoxRev. Regenerate with
      `nix store prefetch-file https://raw.githubusercontent.com/defangdevs/claude-box/<REV>/modules/claude-box.nix`
      (no unpack; we fetch the file, not a tarball).

Conditions:
  UseIpv4: !Equals [!Ref PublicIpv4, 'true']
  UseSpotCond: !Equals [!Ref UseSpot, 'true']
  HasSessionName: !Not [!Equals [!Ref SessionName, '']]
  HasWebPassword: !Not [!Equals [!Ref WebPassword, '']]

Mappings:
  # BEGIN AMI MAP (refreshed by scripts/refresh_amis.py — do not edit by hand)
  RegionMap:
    us-east-1:
      AMI: ami-0d5c505545effc95c
    us-west-2:
      AMI: ami-0b1109b091092c6fe
    eu-central-1:
      AMI: ami-07406de5e8a7ef0f3
    eu-west-1:
      AMI: ami-0550ccab171a40b19
  # END AMI MAP

Resources:
  # Self-contained VPC + IPv6 subnet + IGW + routes. Older AWS default VPCs
  # never got IPv6, so we can't rely on the account's default networking
  # when the template's whole point is to be IPv6-first.
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.42.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Ref AWS::StackName

  VpcIpv6:
    Type: AWS::EC2::VPCCidrBlock
    Properties:
      VpcId: !Ref Vpc
      AmazonProvidedIpv6CidrBlock: true

  Igw:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Ref AWS::StackName

  IgwAttach:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref Vpc
      InternetGatewayId: !Ref Igw

  Subnet:
    Type: AWS::EC2::Subnet
    DependsOn: VpcIpv6
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Select [0, !GetAZs '']
      CidrBlock: 10.42.1.0/24
      Ipv6CidrBlock: !Select
        - 0
        - !Cidr [!Select [0, !GetAtt Vpc.Ipv6CidrBlocks], 1, 64]
      AssignIpv6AddressOnCreation: true
      # No DNS64/NAT64: on AWS, NAT64 translation only happens at a NAT Gateway
      # (the IGW does NOT translate 64:ff9b::/96). We deliberately avoid a NAT
      # Gateway, so every first-boot dependency is fetched over native IPv6 from
      # dual-stack hosts (S3 dual-stack mirror, cache.nixos.org, Let's Encrypt,
      # sslip.io). With no NAT64 translator, enabling DNS64 would only synthesize
      # AAAA that black-hole at the IGW, so we leave it off to fail fast instead.
      Tags:
        - Key: Name
          Value: !Ref AWS::StackName

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Ref AWS::StackName

  RouteV4:
    Type: AWS::EC2::Route
    DependsOn: IgwAttach
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref Igw

  RouteV6:
    Type: AWS::EC2::Route
    DependsOn: IgwAttach
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationIpv6CidrBlock: ::/0
      GatewayId: !Ref Igw

  SubnetRouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref RouteTable
      SubnetId: !Ref Subnet

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: 'claude-box: 443 (web terminal), v4 + v6'
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Ref AWS::StackName
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: !Ref AllowCidr
          Description: Web terminal (Caddy) v4
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIpv6: ::/0
          Description: Web terminal (Caddy) v6

  # NetworkInterface: created explicitly so we can Fn::GetAtt.PrimaryIpv6Address.
  # EnablePrimaryIpv6 is REQUIRED for that GetAtt to return a value: without a
  # designated primary IPv6, Ipv6AddressCount still assigns an address but
  # PrimaryIpv6Address resolves to empty -> "https://.sslip.io/" + blank output.
  NetworkInterface:
    Type: AWS::EC2::NetworkInterface
    Properties:
      SubnetId: !Ref Subnet
      Ipv6AddressCount: 1
      EnablePrimaryIpv6: true
      GroupSet:
        - !GetAtt SecurityGroup.GroupId
      Tags:
        - Key: Name
          Value: !Ref AWS::StackName

  EIP:
    Type: AWS::EC2::EIP
    Condition: UseIpv4
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Ref AWS::StackName

  EIPAssoc:
    Type: AWS::EC2::EIPAssociation
    Condition: UseIpv4
    Properties:
      NetworkInterfaceId: !Ref NetworkInterface
      AllocationId: !GetAtt EIP.AllocationId

  # Carries the persistent-Spot-with-stop options. On a Spot interruption AWS
  # stops (does not terminate) the instance and restarts the SAME instance in
  # the SAME AZ when capacity returns, so root EBS + IPv6 + TLS cert survive.
  # No MaxPrice, so the cap is the on-demand rate.
  SpotLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Condition: UseSpotCond
    Properties:
      TagSpecifications:
        - ResourceType: launch-template
          Tags:
            - Key: Name
              Value: !Ref AWS::StackName
      LaunchTemplateData:
        InstanceMarketOptions:
          MarketType: spot
          SpotOptions:
            SpotInstanceType: persistent
            InstanceInterruptionBehavior: stop

  Instance:
    Type: AWS::EC2::Instance
    # Routing must exist before boot so egress works. The module tarball and
    # every other first-boot dependency are dual-stack, so an IPv6-only box
    # fetches them over native IPv6 via the IGW - no public IPv4, no NAT64.
    # Do NOT DependsOn EIPAssoc: it's conditional (UseIpv4), and DependsOn on an
    # excluded resource makes CFN reject the whole template in IPv6-only mode
    # ("Unresolved resource dependencies [EIPAssoc]"). The EIP is inbound-only
    # and associates in parallel, well before Caddy's ACME step needs it.
    DependsOn:
      - IgwAttach
      - SubnetRouteAssoc
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !FindInMap [RegionMap, !Ref AWS::Region, AMI]
      # Spot options must ride on a launch template - AWS::EC2::Instance has no
      # InstanceMarketOptions of its own. Referenced only when UseSpot=true.
      LaunchTemplate: !If
        - UseSpotCond
        - LaunchTemplateId: !Ref SpotLaunchTemplate
          Version: !GetAtt SpotLaunchTemplate.LatestVersionNumber
        - !Ref AWS::NoValue
      NetworkInterfaces:
        - NetworkInterfaceId: !Ref NetworkInterface
          DeviceIndex: 0
      MetadataOptions:
        HttpTokens: required
        HttpPutResponseHopLimit: 2
      Tags:
        - Key: Name
          Value: !Ref AWS::StackName
      UserData:
        Fn::Base64:
          Fn::Sub:
            - |
              { config, pkgs, lib, modulesPath, ... }:
              let
                # raw.githubusercontent.com is dual-stack (has AAAA); github.com
                # is IPv4-only, so an IPv6-only box would need NAT64 for it.
                # The module is a single file, so no tarball unpack needed.
                claude-box-module = builtins.fetchurl {
                  url = "https://raw.githubusercontent.com/defangdevs/claude-box/${ClaudeBoxRev}/modules/claude-box.nix";
                  sha256 = "${ClaudeBoxSha256}";
                };
                hostname = "${WebHostname}";
                webPassword = "${WebPasswordEff}";
              in {
                imports = [
                  "${!modulesPath}/virtualisation/amazon-image.nix"
                  claude-box-module
                ];

                services.claude-box = {
                  enable = true;
                  agent = "${Agent}";
                  users.agent = {
                    environment = { TERM = "xterm-256color"; };${SessionNameLine}
                  };
                };

                networking.firewall.allowedTCPPorts = [ 443 ];

                services.caddy = {
                  enable = true;
                  virtualHosts."${!hostname}" = {
                    extraConfig = ''
                      tls {
                        issuer acme {
                          disable_http_challenge
                        }
                      }
                      @authed path /${!webPassword}/*
                      handle @authed {
                        reverse_proxy 127.0.0.1:7681
                      }
                      respond 404
                    '';
                  };
                };

                systemd.services.claude-web-terminal = {
                  description = "Browser terminal (ttyd) attached to agent's tmux";
                  after = [ "claude-box-agent.service" "network-online.target" ];
                  wants = [ "network-online.target" ];
                  wantedBy = [ "multi-user.target" ];
                  # Must match the agent service's TMUX_TMPDIR so `tmux attach`
                  # finds the control socket. The agent runs with PrivateTmp, so
                  # the socket lives under /run (not the private /tmp).
                  environment.TMUX_TMPDIR = "/run/agent-box-agent";
                  serviceConfig = {
                    User = "agent";
                    Restart = "always";
                    RestartSec = "5s";
                    ExecStart = "${!pkgs.ttyd}/bin/ttyd --writable -p 7681 -i 127.0.0.1 -b /${!webPassword}/ -t titleFixed=${Agent}-box ${!pkgs.tmux}/bin/tmux -L agent-box attach -t main";
                  };
                };

                # Don't re-apply user-data on every reboot - protects local edits.
                systemd.services.amazon-init.enable = lib.mkForce false;
              }
            - WebHostname: !If
                - UseIpv4
                - !Sub "${EIP}.sslip.io"
                - !Sub
                  - "${IpDashed}.sslip.io"
                  - IpDashed: !Join
                      - '-'
                      - !Split [':', !GetAtt NetworkInterface.PrimaryIpv6Address]
              # Blank when SessionName is unset, so the module falls back to its
              # own default (agent@<host>). Leading newline keeps Nix layout tidy.
              SessionNameLine: !If
                - HasSessionName
                - !Sub "\n                    remoteControlName = \"${SessionName}\";"
                - ''
              # User-supplied token, or the stack's UUID when left blank. The
              # UUID is 122 random bits and only visible to principals with
              # cloudformation:DescribeStacks - the same trust boundary as the
              # token-in-URL itself.
              WebPasswordEff: !If
                - HasWebPassword
                - !Ref WebPassword
                - !Select [2, !Split ['/', !Ref 'AWS::StackId']]

Outputs:
  WebURL:
    Description: >-
      Browser terminal for the selected agent. Claude Code deployments are also
      drivable from the Claude apps via Remote Control.
      First load takes ~2-3 minutes while the instance provisions and Caddy
      issues an ACME cert. The URL includes the WebPassword token - keep it
      private.
    Value: !Sub
      - "https://${Host}.sslip.io/${Pw}/"
      - Host: !If
          - UseIpv4
          - !Ref EIP
          - !Join
              - '-'
              - !Split [':', !GetAtt NetworkInterface.PrimaryIpv6Address]
        Pw: !If
          - HasWebPassword
          - !Ref WebPassword
          - !Select [2, !Split ['/', !Ref 'AWS::StackId']]

  PublicAddress:
    Description: Elastic IP (IPv4 mode) or primary IPv6 (IPv6 mode).
    Value: !If
      - UseIpv4
      - !Ref EIP
      - !GetAtt NetworkInterface.PrimaryIpv6Address

  InstanceId:
    Description: EC2 instance id.
    Value: !Ref Instance
