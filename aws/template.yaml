AWSTemplateFormatVersion: '2010-09-09'

# W2010: WebPassword is NoEcho but appears in the WebURL output. That is by
# design - the whole point of the output is to give the user the URL, and the
# token is part of the URL. Anyone with cloudformation:DescribeStacks on this
# stack can see it; treat that as the same trust boundary as the shared secret.
Metadata:
  cfn-lint:
    config:
      ignore_checks:
        - W2010

Description: >
  claude-box - 1-click NixOS host running Claude Code inside a persistent tmux
  session, accessed through a browser terminal (Caddy + ttyd).
  Source: https://github.com/defangdevs/claude-box

Parameters:
  InstanceType:
    Type: String
    Default: t3.small
    AllowedValues:
      - t3.small
      - t3.medium
      - t3.large
      - t3.xlarge
      - m6i.large
      - m6i.xlarge
      - c6i.large
    Description: >-
      EC2 instance type. t3.small (~2 GB RAM) is fine for a single light agent.

  PublicIpv4:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: >-
      false (default): IPv6-only. No public IPv4 charge (~$0/mo for the
      network address). Requires the client to have IPv6 connectivity.
      true: allocate an Elastic IP for a stable IPv4. ~$3.60/mo per AWS's
      2024 IPv4 pricing (charged for any public IPv4, EIP or not).

  WebPassword:
    Type: String
    NoEcho: true
    MinLength: 16
    MaxLength: 64
    AllowedPattern: ^[A-Za-z0-9._~-]{16,64}$
    Description: >-
      Shared secret for the browser terminal. Embedded into the URL as a path
      token (browsers do not reliably attach Basic Auth to WebSocket upgrades,
      so we go path-token instead of a username/password prompt).
      16-64 URL-safe chars: [A-Za-z0-9._~-].

  AllowCidr:
    Type: String
    Default: 0.0.0.0/0
    AllowedPattern: ^\d{1,3}(\.\d{1,3}){3}/\d{1,2}$
    Description: >-
      IPv4 CIDR allowed to reach 22/443. Default is open. IPv6 ingress is
      always ::/0 - restrict at the SG level after launch if needed.

  ClaudeBoxRev:
    Type: String
    Default: beb8d317a0ad0c61cbb90ec80f680eea51e5657d
    Description: Git rev of defangdevs/claude-box (the module to install).

  ClaudeBoxSha256:
    Type: String
    Default: 0nsi906jhs8l5ghfmk63s6f0v5wycdc373f7p95l3scdgm4hy93a
    Description: >-
      Nix base-32 sha256 of the module tarball at ClaudeBoxRev. Regenerate via
      `nix-prefetch-url --unpack https://github.com/defangdevs/claude-box/archive/<REV>.tar.gz`.

Conditions:
  UseIpv4: !Equals [!Ref PublicIpv4, 'true']

Mappings:
  # BEGIN AMI MAP (refreshed by scripts/refresh_amis.py - do not edit by hand)
  RegionMap:
    us-east-1:
      AMI: ami-0afa19b238bdf9da0
    us-west-2:
      AMI: ami-0521ba8e76c2094b9
    eu-central-1:
      AMI: ami-00ae5c892b1a9cb23
    eu-west-1:
      AMI: ami-0a7e28f614241d0af
  # END AMI MAP

Resources:
  # Self-contained VPC + IPv6 subnet + IGW + routes. Older AWS default VPCs
  # never got IPv6, so we can't rely on the account's default networking
  # when the template's whole point is to be IPv6-first.
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.42.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true

  VpcIpv6:
    Type: AWS::EC2::VPCCidrBlock
    Properties:
      VpcId: !Ref Vpc
      AmazonProvidedIpv6CidrBlock: true

  Igw:
    Type: AWS::EC2::InternetGateway

  IgwAttach:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref Vpc
      InternetGatewayId: !Ref Igw

  Subnet:
    Type: AWS::EC2::Subnet
    DependsOn: VpcIpv6
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Select [0, !GetAZs '']
      CidrBlock: 10.42.1.0/24
      Ipv6CidrBlock: !Select
        - 0
        - !Cidr [!Select [0, !GetAtt Vpc.Ipv6CidrBlocks], 1, 64]
      AssignIpv6AddressOnCreation: true

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc

  RouteV4:
    Type: AWS::EC2::Route
    DependsOn: IgwAttach
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref Igw

  RouteV6:
    Type: AWS::EC2::Route
    DependsOn: IgwAttach
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationIpv6CidrBlock: ::/0
      GatewayId: !Ref Igw

  SubnetRouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref RouteTable
      SubnetId: !Ref Subnet

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: 'claude-box: 443 (web terminal) + 22 (SSH), v4 + v6'
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: !Ref AllowCidr
          Description: Web terminal (Caddy) v4
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIpv6: ::/0
          Description: Web terminal (Caddy) v6
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref AllowCidr
          Description: SSH v4
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIpv6: ::/0
          Description: SSH v6

  # NetworkInterface: created explicitly so we can Fn::GetAtt.PrimaryIpv6Address.
  NetworkInterface:
    Type: AWS::EC2::NetworkInterface
    Properties:
      SubnetId: !Ref Subnet
      Ipv6AddressCount: 1
      GroupSet:
        - !GetAtt SecurityGroup.GroupId

  EIP:
    Type: AWS::EC2::EIP
    Condition: UseIpv4
    Properties:
      Domain: vpc

  EIPAssoc:
    Type: AWS::EC2::EIPAssociation
    Condition: UseIpv4
    Properties:
      NetworkInterfaceId: !Ref NetworkInterface
      AllocationId: !GetAtt EIP.AllocationId

  Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !FindInMap [RegionMap, !Ref AWS::Region, AMI]
      NetworkInterfaces:
        - NetworkInterfaceId: !Ref NetworkInterface
          DeviceIndex: 0
      MetadataOptions:
        HttpTokens: required
        HttpPutResponseHopLimit: 2
      Tags:
        - Key: Name
          Value: claude-box
      UserData:
        Fn::Base64:
          Fn::Sub:
            - |
              { config, pkgs, lib, modulesPath, ... }:
              let
                claude-box = builtins.fetchTarball {
                  url = "https://github.com/defangdevs/claude-box/archive/${ClaudeBoxRev}.tar.gz";
                  sha256 = "${ClaudeBoxSha256}";
                };
                hostname = "${WebHostname}";
                webPassword = "${WebPassword}";
              in {
                imports = [
                  "${!modulesPath}/virtualisation/amazon-image.nix"
                  (claude-box + "/modules/claude-box.nix")
                ];

                services.claude-box = {
                  enable = true;
                  users.agent = {
                    environment = { TERM = "xterm-256color"; };
                  };
                };

                networking.firewall.allowedTCPPorts = [ 22 443 ];

                services.caddy = {
                  enable = true;
                  virtualHosts."${!hostname}" = {
                    extraConfig = ''
                      tls {
                        issuer acme {
                          disable_http_challenge
                        }
                      }
                      @authed path /${!webPassword}/*
                      handle @authed {
                        reverse_proxy 127.0.0.1:7681
                      }
                      respond 404
                    '';
                  };
                };

                systemd.services.claude-web-terminal = {
                  description = "Browser terminal (ttyd) attached to agent's tmux";
                  after = [ "claude-box-agent.service" "network-online.target" ];
                  wants = [ "network-online.target" ];
                  wantedBy = [ "multi-user.target" ];
                  serviceConfig = {
                    User = "agent";
                    Restart = "always";
                    RestartSec = "5s";
                    ExecStart = "${!pkgs.ttyd}/bin/ttyd --writable -p 7681 -i 127.0.0.1 -b /${!webPassword}/ -t titleFixed=claude-box ${!pkgs.tmux}/bin/tmux -L claude-box attach -t main";
                  };
                };

                # Don't re-apply user-data on every reboot - protects local edits.
                systemd.services.amazon-init.enable = lib.mkForce false;
              }
            - WebHostname: !If
                - UseIpv4
                - !Sub "${EIP}.sslip.io"
                - !Sub
                  - "${IpDashed}.sslip.io"
                  - IpDashed: !Join
                      - '-'
                      - !Split [':', !GetAtt NetworkInterface.PrimaryIpv6Address]

Outputs:
  WebURL:
    Description: >-
      Browser terminal. First load takes ~2-3 minutes while the instance
      provisions and Caddy issues an ACME cert. The URL includes your
      WebPassword as a path segment - keep it private.
    Value: !If
      - UseIpv4
      - !Sub "https://${EIP}.sslip.io/${WebPassword}/"
      - !Sub
        - "https://${IpDashed}.sslip.io/${WebPassword}/"
        - IpDashed: !Join
            - '-'
            - !Split [':', !GetAtt NetworkInterface.PrimaryIpv6Address]

  PublicAddress:
    Description: Elastic IP (IPv4 mode) or primary IPv6 (IPv6 mode).
    Value: !If
      - UseIpv4
      - !Ref EIP
      - !GetAtt NetworkInterface.PrimaryIpv6Address

  InstanceId:
    Description: EC2 instance id.
    Value: !Ref Instance
