AWSTemplateFormatVersion: '2010-09-09'

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Terminal access
        Parameters:
          - Agent
          - WebPassword
      - Label:
          default: Compute and cost
        Parameters:
          - InstanceType
          - RootVolumeSize
          - UseSpot
          - PublicIpv4
      - Label:
          default: Agent instructions
        Parameters:
          - AgentsMd
      - Label:
          default: Advanced (rarely needed)
        Parameters:
          - AllowCidr
          - EnableSsm
          - ClaudeBoxRev
          - ClaudeBoxSha256
    ParameterLabels:
      WebPassword:
        default: Web terminal password (16-64 chars — save it, AWS masks it)
      Agent:
        default: Agent CLI
      InstanceType:
        default: EC2 instance type
      RootVolumeSize:
        default: Root volume size (GiB)
      UseSpot:
        default: Use a Spot instance (cheaper)
      PublicIpv4:
        default: Allocate a public IPv4 (costs ~$3.60/mo)
      AllowCidr:
        default: IPv4 CIDR allowed to reach 443
      EnableSsm:
        default: Enable SSM Session Manager root access
      AgentsMd:
        default: AGENTS.md seeded on first agent start
      ClaudeBoxRev:
        default: claude-box git rev
      ClaudeBoxSha256:
        default: claude-box module sha256
Description: >
  claude-box - 1-click NixOS host running a coding agent inside a persistent
  tmux session. Choose Claude Code or Codex at deployment time. Reach it through
  a browser terminal (Caddy + ttyd); Claude Code sessions can also be driven
  from the Claude desktop and mobile apps via Remote Control.
  Source: https://github.com/defangdevs/claude-box

Parameters:
  Agent:
    Type: String
    Default: claude
    AllowedValues:
      - claude
      - codex
    Description: >-
      Agent CLI to run in the persistent tmux session. Supported values:
      claude (Claude Code) and codex (OpenAI Codex CLI). Claude-specific
      Remote Control settings are ignored when codex is selected.

  InstanceType:
    Type: String
    Default: t4g.small
    AllowedValues:
      - t4g.small
      - t4g.medium
      - t4g.large
      - t4g.xlarge
      - m7g.large
      - m7g.xlarge
      - c7g.large
    Description: >-
      EC2 instance type. All choices are Graviton (aarch64) — cheaper than
      the x86 equivalents and paired with an aarch64 NixOS AMI in the
      RegionMap below. t4g.small (~2 GB RAM, ~$0.017/hr) is fine for a
      single light agent.

  RootVolumeSize:
    Type: Number
    Default: 30
    MinValue: 8
    MaxValue: 1024
    Description: >-
      Root EBS volume size in GiB (gp3, ~$0.08/GiB-month). The NixOS AMI's
      own snapshot is only a few GiB and the nix store grows with every
      rebuild/self-update, so keep real headroom. NixOS grows the partition
      and filesystem to fill the volume on every boot, which also means you
      can enlarge the volume of a RUNNING box later (EC2 console -> Volumes
      -> Modify) and simply reboot the instance to claim the space — no
      in-instance steps. EBS cannot shrink a volume.

  PublicIpv4:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: >-
      false (default): IPv6-only. No public IPv4 charge (~$0/mo for the
      network address). Requires the client to have IPv6 connectivity.
      true: allocate an Elastic IP for a stable IPv4. ~$3.60/mo per AWS's
      2024 IPv4 pricing (charged for any public IPv4, EIP or not).

  UseSpot:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: >-
      true (default): run as a persistent Spot instance (~70-90% cheaper).
      On a Spot interruption AWS stops the instance and restarts the SAME
      instance in the SAME AZ when capacity returns, so the root volume,
      IPv6 address, and TLS cert all survive. The live tmux session does
      not (RAM is lost on any stop). Risk: if this AZ+type pool stays
      capacity-starved, the box stays stopped until it frees up.
      false: on-demand (always available, full price).

  WebPassword:
    Type: String
    NoEcho: true
    MinLength: 16
    MaxLength: 64
    AllowedPattern: ^[A-Za-z0-9._~-]{16,64}$
    Description: >-
      Shared secret for the browser terminal. Log in with username "agent" and
      this password; Caddy then sets an HttpOnly Secure cookie so the WebSocket
      upgrade can authenticate without putting the secret in the URL. Use 16-64
      chars from [A-Za-z0-9._~-]. AWS masks this field with dots after you type
      it and never emits it in stack outputs, so save it somewhere before you
      launch — there is no way to recover it later. Even Claude Code stacks
      that plan to drive the box via Remote Control need this the first time,
      to complete `claude login` in the browser terminal.

  AgentsMd:
    Type: String
    Default: |-
      # claude-box

      You are running inside a claude-box deployment. Your browser terminal is
      reachable at $CLAUDE_BOX_URL (run `echo $CLAUDE_BOX_URL` to print it).
      Share that URL with anyone who needs to view or take over your session;
      sign-in username is `agent` and the password was set at deploy time.

      Update the box's software with:
      `sudo systemctl start claude-box-update.service`
      (kills the running tmux session — save context first).
    Description: >-
      Content seeded to /home/agent/AGENTS.md on first agent start (skipped if
      the file already exists). AGENTS.md is the cross-vendor agent-
      instructions convention read natively by codex and opencode, and by
      claude-code as a CLAUDE.md fallback. The default references
      $CLAUDE_BOX_URL, which the agent's systemd env sets to this box's
      browser-terminal URL; `echo $CLAUDE_BOX_URL` in the terminal prints it.
      Blank to skip seeding entirely. Content is embedded into user-data as a
      Nix indented string, so avoid the sequences `${` and `''` in the body —
      Nix will otherwise try to antiquote / close the string mid-file. Plain
      $VAR (no braces) is fine.

  AllowCidr:
    Type: String
    Default: 0.0.0.0/0
    AllowedPattern: ^\d{1,3}(\.\d{1,3}){3}/\d{1,2}$
    Description: >-
      IPv4 CIDR allowed to reach 443. Default is open. IPv6 ingress is
      always ::/0 - restrict at the SG level after launch if needed.

  EnableSsm:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: >-
      true (default): attach an IAM instance profile with
      AmazonSSMManagedInstanceCore so the deployer can open a root shell via
      AWS Systems Manager Session Manager (Console -> Systems Manager ->
      Session Manager, or `aws ssm start-session`). This is the only
      privileged access path baked in - the template ships no SSH KeyName -
      so leaving it on means a broken first boot is still debuggable
      (amazon-init logs are otherwise journal-only and invisible to
      get-console-output). Because the template then creates IAM resources,
      the Launch Stack console flow adds a one-checkbox CAPABILITY_IAM
      acknowledgment. The AMI's amazon-ssm-agent is enabled unconditionally
      by NixOS's virtualisation/amazon-image.nix; with no instance profile
      it just fails to register and sits idle, so flipping this to false
      costs nothing at runtime and skips the IAM prompt at launch time.
      false: no instance profile, no SSM session access, no CAPABILITY_IAM
      prompt.

  ClaudeBoxRev:
    Type: String
    Description: >-
      Git commit sha of defangdevs/claude-box. The module (a single .nix file)
      is fetched from raw.githubusercontent.com at this ref - that host is
      dual-stack (IPv6-reachable), so an IPv6-only box needs no NAT64 path.
      github.com itself is IPv4-only and can't be used directly. No Default:
      here on purpose - Rev + Sha256 are a pinned pair, and `builtins.fetchurl`
      in user-data hard-fails on any drift, so we can't ship a moving default
      like "master". The 1-click Launch buttons hit the S3-published copy of
      this template, into which publish-template.yml injects a Default for
      both fields at every master push.

  ClaudeBoxSha256:
    Type: String
    Description: >-
      Nix sha256 of modules/claude-box.nix at ClaudeBoxRev (SRI form:
      sha256-<base64>). Must match ClaudeBoxRev's content exactly.
      Regenerate with `nix store prefetch-file
      https://raw.githubusercontent.com/defangdevs/claude-box/<REV>/modules/claude-box.nix`
      (no unpack; we fetch the file, not a tarball). See ClaudeBoxRev for
      why there is no Default here.

Conditions:
  UseIpv4: !Equals [!Ref PublicIpv4, 'true']
  UseSpotCond: !Equals [!Ref UseSpot, 'true']
  UseSsm: !Equals [!Ref EnableSsm, 'true']

Mappings:
  # BEGIN AMI MAP (refreshed by scripts/refresh_amis.py — do not edit by hand)
  RegionMap:
    us-east-1:
      AMI: ami-0d5c505545effc95c
    us-west-2:
      AMI: ami-0b1109b091092c6fe
    eu-central-1:
      AMI: ami-07406de5e8a7ef0f3
    eu-west-1:
      AMI: ami-0550ccab171a40b19
  # END AMI MAP

Resources:
  # Self-contained VPC + IPv6 subnet + IGW + routes. Older AWS default VPCs
  # never got IPv6, so we can't rely on the account's default networking
  # when the template's whole point is to be IPv6-first.
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.42.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Ref AWS::StackName

  VpcIpv6:
    Type: AWS::EC2::VPCCidrBlock
    Properties:
      VpcId: !Ref Vpc
      AmazonProvidedIpv6CidrBlock: true

  Igw:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Ref AWS::StackName

  IgwAttach:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref Vpc
      InternetGatewayId: !Ref Igw

  Subnet:
    Type: AWS::EC2::Subnet
    DependsOn: VpcIpv6
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Select [0, !GetAZs '']
      CidrBlock: 10.42.1.0/24
      Ipv6CidrBlock: !Select
        - 0
        - !Cidr [!Select [0, !GetAtt Vpc.Ipv6CidrBlocks], 1, 64]
      AssignIpv6AddressOnCreation: true
      # No DNS64/NAT64: on AWS, NAT64 translation only happens at a NAT Gateway
      # (the IGW does NOT translate 64:ff9b::/96). We deliberately avoid a NAT
      # Gateway, so every first-boot dependency is fetched over native IPv6 from
      # dual-stack hosts (S3 dual-stack mirror, cache.nixos.org, Let's Encrypt,
      # sslip.io). With no NAT64 translator, enabling DNS64 would only synthesize
      # AAAA that black-hole at the IGW, so we leave it off to fail fast instead.
      Tags:
        - Key: Name
          Value: !Ref AWS::StackName

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Ref AWS::StackName

  RouteV4:
    Type: AWS::EC2::Route
    DependsOn: IgwAttach
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref Igw

  RouteV6:
    Type: AWS::EC2::Route
    DependsOn: IgwAttach
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationIpv6CidrBlock: ::/0
      GatewayId: !Ref Igw

  SubnetRouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref RouteTable
      SubnetId: !Ref Subnet

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: 'claude-box: 443 (web terminal), v4 + v6'
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Ref AWS::StackName
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: !Ref AllowCidr
          Description: Web terminal (Caddy) v4
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIpv6: ::/0
          Description: Web terminal (Caddy) v6

  # NetworkInterface: created explicitly so we can Fn::GetAtt.PrimaryIpv6Address.
  # EnablePrimaryIpv6 is REQUIRED for that GetAtt to return a value: without a
  # designated primary IPv6, Ipv6AddressCount still assigns an address but
  # PrimaryIpv6Address resolves to empty -> "https://.sslip.io/agent/".
  NetworkInterface:
    Type: AWS::EC2::NetworkInterface
    Properties:
      SubnetId: !Ref Subnet
      Ipv6AddressCount: 1
      EnablePrimaryIpv6: true
      GroupSet:
        - !GetAtt SecurityGroup.GroupId
      Tags:
        - Key: Name
          Value: !Ref AWS::StackName

  EIP:
    Type: AWS::EC2::EIP
    Condition: UseIpv4
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Ref AWS::StackName

  EIPAssoc:
    Type: AWS::EC2::EIPAssociation
    Condition: UseIpv4
    Properties:
      NetworkInterfaceId: !Ref NetworkInterface
      AllocationId: !GetAtt EIP.AllocationId

  # SSM Session Manager access. The template ships no SSH KeyName, so this
  # role is the only privileged path onto the box - critical when a first
  # boot fails, since amazon-init writes to the journal only and is
  # invisible to ec2:GetConsoleOutput. AmazonSSMManagedInstanceCore is the
  # AWS-managed policy documented for Session Manager; it grants only what
  # the ssm-agent needs (ssm:UpdateInstanceInformation, the messaging /
  # session channels, and a narrow set of ec2messages/ssmmessages actions).
  # No S3, no KMS, no CloudWatch Logs - Session Manager output stays on the
  # instance unless the operator opts in later.
  InstanceRole:
    Type: AWS::IAM::Role
    Condition: UseSsm
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Tags:
        - Key: Name
          Value: !Ref AWS::StackName

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Condition: UseSsm
    Properties:
      Roles:
        - !Ref InstanceRole

  # Carries the persistent-Spot-with-stop options. On a Spot interruption AWS
  # stops (does not terminate) the instance and restarts the SAME instance in
  # the SAME AZ when capacity returns, so root EBS + IPv6 + TLS cert survive.
  # No MaxPrice, so the cap is the on-demand rate.
  SpotLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Condition: UseSpotCond
    Properties:
      TagSpecifications:
        - ResourceType: launch-template
          Tags:
            - Key: Name
              Value: !Ref AWS::StackName
      LaunchTemplateData:
        InstanceMarketOptions:
          MarketType: spot
          SpotOptions:
            SpotInstanceType: persistent
            InstanceInterruptionBehavior: stop

  Instance:
    Type: AWS::EC2::Instance
    # Routing must exist before boot so egress works. The module tarball and
    # every other first-boot dependency are dual-stack, so an IPv6-only box
    # fetches them over native IPv6 via the IGW - no public IPv4, no NAT64.
    # Do NOT DependsOn EIPAssoc: it's conditional (UseIpv4), and DependsOn on an
    # excluded resource makes CFN reject the whole template in IPv6-only mode
    # ("Unresolved resource dependencies [EIPAssoc]"). The EIP is inbound-only
    # and associates in parallel, well before Caddy's ACME step needs it.
    DependsOn:
      - IgwAttach
      - SubnetRouteAssoc
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !FindInMap [RegionMap, !Ref AWS::Region, AMI]
      # Root volume. DeviceName must match the AMI's RootDeviceName
      # (/dev/xvda on official NixOS AMIs) — a mismatch would silently
      # attach a SECOND volume instead of sizing the root. NixOS grows the
      # partition + filesystem to fill the volume on boot, so this parameter
      # (and later console enlargements followed by a reboot) needs no
      # in-instance tooling.
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: !Ref RootVolumeSize
            VolumeType: gp3
            DeleteOnTermination: true
      # IamInstanceProfile takes the profile *name* (not ARN); AWS::NoValue
      # when EnableSsm=false so the whole IAM stack is skipped and the launch
      # form does not display CAPABILITY_IAM.
      IamInstanceProfile: !If
        - UseSsm
        - !Ref InstanceProfile
        - !Ref AWS::NoValue
      # Spot options must ride on a launch template - AWS::EC2::Instance has no
      # InstanceMarketOptions of its own. Referenced only when UseSpot=true.
      LaunchTemplate: !If
        - UseSpotCond
        - LaunchTemplateId: !Ref SpotLaunchTemplate
          Version: !GetAtt SpotLaunchTemplate.LatestVersionNumber
        - !Ref AWS::NoValue
      NetworkInterfaces:
        - NetworkInterfaceId: !Ref NetworkInterface
          DeviceIndex: 0
      MetadataOptions:
        HttpTokens: required
        HttpPutResponseHopLimit: 2
      Tags:
        - Key: Name
          Value: !Ref AWS::StackName
      UserData:
        Fn::Base64:
          Fn::Sub:
            - |
              { config, pkgs, lib, modulesPath, ... }:
              let
                # Module pin. First boot uses the launch-time parameters; after
                # that, claude-box-update.service (see selfUpdate below) owns
                # the pin file and rewrites it to fast-forward the box, so the
                # same configuration.nix keeps working across updates without
                # being edited.
                pin =
                  if builtins.pathExists /etc/nixos/claude-box-pin.nix
                  then import /etc/nixos/claude-box-pin.nix
                  else { rev = "${ClaudeBoxRev}"; sha256 = "${ClaudeBoxSha256}"; };
                # Agent-CLI pin: a nixos-unstable channel-release snapshot that
                # only the agent packages (claude-code, codex) resolve from.
                # Absent on first boot (agents ship from the module's own
                # nixpkgs); claude-box-update.service writes it on the first
                # update, after which agent CLIs track nixos-unstable instead
                # of the AMI's release channel.
                agentPin =
                  if builtins.pathExists /etc/nixos/claude-box-agent-pin.nix
                  then import /etc/nixos/claude-box-agent-pin.nix
                  else null;
                # raw.githubusercontent.com is dual-stack (has AAAA); github.com
                # is IPv4-only, so an IPv6-only box would need NAT64 for it.
                # The module is a single file, so no tarball unpack needed.
                claude-box-module = builtins.fetchurl {
                  url = "https://raw.githubusercontent.com/defangdevs/claude-box/${!pin.rev}/modules/claude-box.nix";
                  sha256 = pin.sha256;
                };
                hostname = "${WebHostname}";
                webPassword = "${WebPassword}";
              in {
                imports = [
                  "${!modulesPath}/virtualisation/amazon-image.nix"
                  claude-box-module
                ];

                services.claude-box = {
                  enable = true;
                  agent = "${Agent}";
                  users.agent = {
                    environment = { TERM = "xterm-256color"; };
                    remoteControlName = "${StackName}";
                    web.passwordHashFile = "/var/lib/claude-box-web/password-hash";
                    # AGENTS.md content from the CFN AgentsMd parameter, spliced
                    # as-is into a Nix indented string. Content lines land at
                    # column 0 (matching the CFN sub position), so Nix's
                    # dedent leaves them untouched. The default references
                    # $CLAUDE_BOX_URL, which the module exports in the agent's
                    # systemd env — the agent can `echo` it in the terminal.
                    # The module skips seeding when the target file already
                    # exists, so this is safe to (re)apply.
                    agentsMd = ''
${AgentsMd}
'';
                  };
                  web = {
                    enable = true;
                    domain = hostname;
                    user = "agent";
                  };
                  # Lets the agent update the box on request:
                  #   sudo systemctl start claude-box-update.service
                  # fast-forwards the pin above to upstream HEAD and rebuilds.
                  selfUpdate = {
                    enable = true;
                    rev = pin.rev;
                    agentNixpkgs = agentPin;
                  };
                };

                # Materialize passwordHashFile from the plaintext CFN parameter
                # BEFORE any service reads it. Activation scripts run at
                # nixos-rebuild switch time (first boot from user-data), before
                # systemd units start — perfect ordering for the module's
                # claude-web-auth-secrets service, which reads the hash. The
                # file lives outside /nix/store so the plaintext-derived hash
                # doesn't end up in a world-readable store path.
                # Subshell: activation snippets share one shell, so a bare
                # `umask 077` here leaks into the users/etc snippets that run
                # later — update-users-groups.pl then writes /etc/passwd and
                # /etc/group 0600, nsncd can't read them, and every NSS lookup
                # (User= resolution, chown by name) fails until reboot.
                system.activationScripts.claude-web-password-hash.text = ''
                  install -d -m 0700 /var/lib/claude-box-web
                  if [ ! -s /var/lib/claude-box-web/password-hash ]; then
                    (
                      umask 077
                      ${!pkgs.caddy}/bin/caddy hash-password --plaintext ${!lib.escapeShellArg webPassword} \
                        > /var/lib/claude-box-web/password-hash
                    )
                    chmod 0600 /var/lib/claude-box-web/password-hash
                  fi
                '';

                # Disk watchdog. The nix store grows on every rebuild /
                # self-update and a full root wedges the whole box, agent
                # included — GC is the recovery nobody is around to run.
                # min-free/max-free additionally trigger GC mid-build when
                # free space dips, which is exactly when it matters.
                nix.gc = {
                  automatic = true;
                  options = "--delete-older-than 7d";
                };
                nix.settings = {
                  min-free = 1073741824;  # start GC below 1 GiB free
                  max-free = 5368709120;  # ... and free up to 5 GiB
                };
                # The journal otherwise defaults to 10% of the filesystem.
                services.journald.extraConfig = "SystemMaxUse=200M";

                # Don't re-apply user-data on every reboot - protects local edits.
                systemd.services.amazon-init.enable = lib.mkForce false;
              }
            - WebHostname: !If
                - UseIpv4
                - !Sub "${EIP}.sslip.io"
                - !Sub
                  - "${IpDashed}.sslip.io"
                  - IpDashed: !Join
                      - '-'
                      - !Split [':', !GetAtt NetworkInterface.PrimaryIpv6Address]
              StackName: !Ref AWS::StackName

Outputs:
  WebURL:
    Description: >-
      Browser terminal for the selected agent. Claude Code deployments are also
      drivable from the Claude apps via Remote Control after the first login.
      First load takes ~2-3 minutes while the instance provisions and Caddy
      issues an ACME cert. Sign in with username "agent" and the WebPassword
      chosen at deployment time. (The URL deliberately carries no user@
      prefix: Chrome answers the auth challenge with URL userinfo plus an
      EMPTY password, and credentials typed into the prompt cannot override
      the URL-embedded identity — issue 56.)
    Value: !Sub
      - "https://${Host}.sslip.io/agent/"
      - Host: !If
          - UseIpv4
          - !Ref EIP
          - !Join
              - '-'
              - !Split [':', !GetAtt NetworkInterface.PrimaryIpv6Address]

  RemoteControlSession:
    Description: >-
      Claude Remote Control session name. After finishing `claude login` once
      in the browser terminal, the Claude desktop / mobile apps can drive this
      session directly (sign in with the same Claude account). Only meaningful
      when Agent=claude; Codex has no Remote Control channel.
    Value: !Ref AWS::StackName

  PublicAddress:
    Description: Elastic IP (IPv4 mode) or primary IPv6 (IPv6 mode).
    Value: !If
      - UseIpv4
      - !Ref EIP
      - !GetAtt NetworkInterface.PrimaryIpv6Address

  InstanceId:
    Description: EC2 instance id.
    Value: !Ref Instance
